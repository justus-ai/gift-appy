services:
  - type: web
    name: gift-appy
    env: python
    region: frankfurt
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn giftappy.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          type: web
          name: gift-appy
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: gift-appy-db
          property: connectionString

databases:
  - name: gift-appy-db
    databaseName: giftappy
    plan: free
    region: frankfurt
